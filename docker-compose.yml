services:
  service_a:
    build:
      context: ./services/service_a
    container_name: service_a
    ports:
      - "8001:8000"
    env_file:
      - ./services/service_a/.env

  service_b:
    build:
      context: ./services/service_b
    container_name: service_b
    ports:
      - "8002:8000"
    env_file:
      - ./services/service_b/.env
