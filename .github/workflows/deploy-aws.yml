name: Deploy Microservices to AWS

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'eu-north-1' }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY || 'salliemae_repo' }}
  ECS_CLUSTER: ${{ vars.ECS_CLUSTER || 'salliemae_cluster' }}

jobs:
  test:
    name: Test services
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        service:
          - service_a
          - service_b

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/${{ matrix.service }}/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r services/${{ matrix.service }}/requirements.txt

      - name: Run tests
        working-directory: services/${{ matrix.service }}
        env:
          DATABASE_URL: sqlite:///./test.db
          PYTHONPATH: .
        run: pytest tests -p no:cacheprovider

  deploy:
    name: Build, push, and deploy
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: service_a
            context: services/service_a
            dockerfile: services/service_a/Dockerfile
            ecs_service_var: ECS_SERVICE_A
          - service: service_b
            context: services/service_b
            dockerfile: services/service_b/Dockerfile
            ecs_service_var: ECS_SERVICE_B

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image values
        id: image
        run: |
          REPOSITORY="${ECR_REPOSITORY}-${{ matrix.service }}"
          IMAGE_URI="${{ steps.ecr-login.outputs.registry }}/${REPOSITORY}:${{ github.sha }}"
          echo "repository=${REPOSITORY}" >> "$GITHUB_OUTPUT"
          echo "uri=${IMAGE_URI}" >> "$GITHUB_OUTPUT"

      - name: Ensure ECR repository exists
        run: |
          aws ecr describe-repositories --repository-names "${{ steps.image.outputs.repository }}" >/dev/null 2>&1 || \
          aws ecr create-repository \
            --repository-name "${{ steps.image.outputs.repository }}" \
            --image-scanning-configuration scanOnPush=true \
            --encryption-configuration encryptionType=AES256

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ steps.image.outputs.uri }}
            ${{ steps.ecr-login.outputs.registry }}/${{ steps.image.outputs.repository }}:latest

      - name: Deploy ECS service
        env:
          ECS_SERVICE_A: ${{ vars.ECS_SERVICE_A || 'service-a' }}
          ECS_SERVICE_B: ${{ vars.ECS_SERVICE_B || 'service-b' }}
        run: |
          ECS_SERVICE_VAR="${{ matrix.ecs_service_var }}"
          ECS_SERVICE="${!ECS_SERVICE_VAR}"
          aws ecs update-service \
            --cluster "${ECS_CLUSTER}" \
            --service "${ECS_SERVICE}" \
            --force-new-deployment

      - name: Wait for ECS service stability
        env:
          ECS_SERVICE_A: ${{ vars.ECS_SERVICE_A || 'service-a' }}
          ECS_SERVICE_B: ${{ vars.ECS_SERVICE_B || 'service-b' }}
        run: |
          ECS_SERVICE_VAR="${{ matrix.ecs_service_var }}"
          ECS_SERVICE="${!ECS_SERVICE_VAR}"
          aws ecs wait services-stable \
            --cluster "${ECS_CLUSTER}" \
            --services "${ECS_SERVICE}"


